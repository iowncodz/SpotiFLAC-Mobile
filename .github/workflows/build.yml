name: Build Muischub APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    # 🔥 YEH STEP FIX KAR DEGA SDK VERSION - IMPORTANT!
    - name: Install flutterfix and fix SDK constraints
      run: |
        dart pub global activate flutterfix
        export PATH="$PATH":"$HOME/.pub-cache/bin"
        flutterfix sync --original
        # Force update SDK constraint
        sed -i 's/>=3.10.0/>=3.4.0/g' pubspec.yaml
        sed -i 's/^sdk: .*/sdk: ">=3.4.0 <4.0.0"/' pubspec.yaml
    
    - name: Clean and get dependencies
      run: |
        flutter clean
        flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Muischub-App
        path: build/app/outputs/flutter-apk/app-release.apk
