name: Build Muischub APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Fix SDK and dependencies
      run: |
        # Fix SDK constraint
        sed -i 's/>=3.10.0/>=3.5.0/g' pubspec.yaml
        # Fix json_serializable version
        sed -i 's/json_serializable: ^6.14.0/json_serializable: ^6.8.0/g' pubspec.yaml
    
    - name: Clean and get dependencies
      run: |
        flutter clean
        flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Muischub-App
        path: build/app/outputs/flutter-apk/app-release.apk
